<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Регистрация - Workout App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="auth-container">
    <h1>Регистрация</h1>
    <div id="error-msg" class="error-message"></div>
    <form id="register-form">
      <input type="text" id="username" placeholder="Имя пользователя" required autocomplete="username">
      <input type="password" id="password" placeholder="Пароль" required autocomplete="new-password">
      <button type="submit" id="submit-btn">Зарегистрироваться</button>
    </form>
    <div class="auth-links">
      <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </div>
  <script type="module">
    import { api, getToken, setToken } from './api.js';

    if (getToken()) {
      window.location.href = 'index.html';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const usernameInput = document.getElementById('username').value;
      const passwordInput = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      errorMsg.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Регистрация...';

      try {
        const res = await api.register(usernameInput, passwordInput);
        if (res && res.token) {
          setToken(res.token);
          window.location.href = 'index.html';
        } else {
          errorMsg.textContent = 'Неизвестная ошибка';
        }
      } catch (err) {
        errorMsg.textContent = err.message || 'Ошибка регистрации';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Зарегистрироваться';
      }
    });
  </script>
</body>
</html>
